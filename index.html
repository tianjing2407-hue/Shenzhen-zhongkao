<style>

body{background:#1a1a2e;color:#e0e0e0;font-family:'Courier New','Microsoft YaHei',monospace;overflow:hidden;height:100vh;display:flex;justify-content:center;align-items:center}

.agrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}

.acard:hover{border-color:#4ecdc4;background:#0a1a33}

.ebox{background:#16213e;border:3px solid #e94560;padding:18px;max-width:520px;width:92%;box-shadow:6px 6px 0 #000}

.music-btn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.4);border:1px solid #555;color:#888;font-size:18px;width:32px;height:32px;cursor:pointer;z-index:200;border-radius:3px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.music-btn:hover{color:#ffd700;border-color:#ffd700}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0a0a23}::-webkit-scrollbar-thumb{background:#555}

<script>
(function(){
"use strict";
var CL=['许晓晴','徐艺洲','蓝昊','耿邦粟','高进程'];
var _clUsed=[];
function cm(){
  if(!_clUsed.length)_clUsed=CL.slice();
  var i=Math.floor(Math.random()*_clUsed.length);
  return _clUsed.splice(i,1)[0];
}
function R(){return Math.random();}
function rI(a,b){return Math.floor(R()*(b-a+1))+a;}
function cl(v,mn,mx){if(mn===undefined)mn=0;if(mx===undefined)mx=100;return Math.max(mn,Math.min(mx,Math.round(v)));}
function pkNew(arr,usedMap,key){
  if(!usedMap[key])usedMap[key]=[];
  var avail=[];
  for(var i=0;i<arr.length;i++){if(usedMap[key].indexOf(i)<0)avail.push(i);}
  if(!avail.length){usedMap[key]=[];for(var i=0;i<arr.length;i++)avail.push(i);}
  var idx=avail[Math.floor(R()*avail.length)];
  usedMap[key].push(idx);
  return arr[idx];
}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(R()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

// ===== 音乐系统 (Web Audio API 纯代码生成) =====
var audioCtx=null;
var musicPlaying=false;
var musicNodes=[];
var currentTrack='';

function initAudio(){
  if(audioCtx)return;
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return;}
}

function stopMusic(){
  for(var i=0;i<musicNodes.length;i++){
    try{musicNodes[i].stop?musicNodes[i].stop():musicNodes[i].disconnect();}catch(e){}
  }
  musicNodes=[];musicPlaying=false;currentTrack='';
  document.getElementById('music-btn').textContent='🔇';
}

function playNote(freq,start,dur,type,vol,detune){
  if(!audioCtx)return;
  var osc=audioCtx.createOscillator();
  var gain=audioCtx.createGain();
  osc.type=type||'square';
  osc.frequency.value=freq;
  if(detune)osc.detune.value=detune;
  gain.gain.setValueAtTime(0,audioCtx.currentTime+start);
  gain.gain.linearRampToValueAtTime(vol||0.06,audioCtx.currentTime+start+0.02);
  gain.gain.setValueAtTime(vol||0.06,audioCtx.currentTime+start+dur*0.7);
  gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+start+dur);
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime+start);
  osc.stop(audioCtx.currentTime+start+dur);
  musicNodes.push(osc);
  return osc;
}

// 主界面BGM - 两只老虎 8-bit像素风版
function playMenuMusic(){
  if(currentTrack==='menu')return;
  stopMusic();currentTrack='menu';musicPlaying=true;
  document.getElementById('music-btn').textContent='🔊';
  // 两只老虎 C大调: do re mi do | do re mi do | mi fa sol - | mi fa sol -
  // sol la sol fa mi do | sol la sol fa mi do | do sol(低) do - | do sol(低) do -
  var mel=[
    262,294,330,262, 262,294,330,262, 330,349,392,392, 330,349,392,392,
    392,440,392,349,330,262, 392,440,392,349,330,262, 262,196,262,262, 262,196,262,262
  ];
  var dur=[
    .3,.3,.3,.3, .3,.3,.3,.3, .3,.3,.5,.1, .3,.3,.5,.1,
    .2,.2,.2,.2,.3,.3, .2,.2,.2,.2,.3,.3, .3,.3,.5,.1, .3,.3,.5,.1
  ];
  var bas=[
    131,131,165,131, 131,131,165,131, 165,175,196,196, 165,175,196,196,
    196,220,196,175,165,131, 196,220,196,175,165,131, 131,98,131,131, 131,98,131,131
  ];
  var bpm=0.28;
  function loop(){
    if(currentTrack!=='menu')return;
    var t=0;
    for(var i=0;i<mel.length;i++){
      var d=dur[i]*bpm/.3;
      playNote(mel[i],t,d*0.85,'square',0.035);
      playNote(bas[i],t,d*0.9,'triangle',0.04);
      if(i%4===0)playNote(mel[i]*2,t,d*0.4,'sine',0.015);
      t+=d;
    }
    setTimeout(loop,t*1000+200);
  }
  loop();
}

// 游戏中BGM - D小调，带节奏感，紧张但不压抑
function playGameMusic(){
  if(currentTrack==='game')return;
  stopMusic();currentTrack='game';musicPlaying=true;
  document.getElementById('music-btn').textContent='🔊';
  var mel=[294,349,330,294,262,294,349,392,440,392,349,330,294,262,247,294];
  var bas=[147,147,165,165,131,131,175,175,220,220,175,175,147,131,124,147];
  var bpm=0.25;
  function loop(){
    if(currentTrack!=='game')return;
    for(var i=0;i<mel.length;i++){
      playNote(mel[i],i*bpm,bpm*0.7,'square',0.03);
      playNote(bas[i],i*bpm,bpm*0.85,'triangle',0.04);
      // 节奏鼓点
      if(i%2===0)playNote(90,i*bpm,0.04,'sawtooth',0.025);
      if(i%4===3)playNote(120,i*bpm,0.03,'sawtooth',0.02);
      // 高音点缀
      if(i%4===0)playNote(mel[i]*2,i*bpm+bpm*0.5,bpm*0.3,'sine',0.012);
    }
    setTimeout(loop,mel.length*bpm*1000);
  }
  loop();
}

// 结局BGM - 降E大调，温暖治愈，像夕阳下的校园
function playEndMusic(){
  if(currentTrack==='end')return;
  stopMusic();currentTrack='end';musicPlaying=true;
  document.getElementById('music-btn').textContent='🔊';
  var mel=[311,349,392,466,523,466,392,349,311,349,392,466,523,587,523,466];
  var bas=[156,156,196,196,233,233,196,196,156,175,196,233,262,294,262,233];
  var pad=[392,392,466,466,523,523,466,466,392,440,466,523,587,659,587,523];
  var bpm=0.5;
  function loop(){
    if(currentTrack!=='end')return;
    for(var i=0;i<mel.length;i++){
      playNote(mel[i],i*bpm,bpm*0.9,'sine',0.04);
      playNote(bas[i],i*bpm,bpm*0.95,'triangle',0.035);
      // 柔和和弦垫底
      playNote(pad[i],i*bpm,bpm*1.2,'sine',0.015);
      if(i%4===0)playNote(mel[i]*0.5,i*bpm,bpm*2.5,'sine',0.02);
    }
    setTimeout(loop,mel.length*bpm*1000);
  }
  loop();
}

function toggleMusic(){
  initAudio();
  if(musicPlaying){stopMusic();}
  else{
    // 根据当前界面播放对应音乐
    if(document.getElementById('S0').classList.contains('on')||document.getElementById('S1').classList.contains('on'))playMenuMusic();
    else if(document.getElementById('S3').classList.contains('on'))playEndMusic();
    else playGameMusic();
  }
}

// ===== 游戏数据 =====
var ROUNDS=[

  {m:'2月',name:'🧧 "过年：亲戚的灵魂拷问"',days:130,extra:true},

  {m:'5月',name:'📮 "填志愿：人生第一次赌博"',days:40,vol:true},
  {m:'6月',name:'🎯 "决战：就这？就这！"',days:0,final:true}
];
var FAMILIES=[
  {name:'🏦 大富之家',money:2000,desc:'补习班随便报，但你妈对你期望超高'},
  {name:'🏠 小康之家',money:600,desc:'够用但得算着花，你妈说尽力就好'}

var RANK_TIERS=[
  {min:1,max:30,pct:8,icon:'👑',cls:'eu',label:'欧皇开局',comments:['你初二下居然考了全校前30？！你确定不是梦游考的？','六班老师看到成绩单笑出了声，已经在想怎么吹了。','你妈把你的成绩单设成了手机壁纸。']},
  {min:31,max:150,pct:22,icon:'⭐',cls:'high',label:'成绩偏高',comments:['不错嘛，六班老师对你寄予厚望。别让他失望了。',cm()+'：大佬带我飞！ 你：我自己都还没飞起来……','你妈跟亲戚炫耀的时候嘴角已经压不住了。']},
  {min:151,max:350,pct:40,icon:'😐',cls:'mid',label:'年级中游',comments:['不上不下，最安全也最危险的位置。',cm()+'和你排名就差两名，你们互相看了一眼，默默翻开课本。','六班老师说："你有潜力，就是不够努力。"——你听了八百遍了。']},
  {min:351,max:460,pct:22,icon:'😬',cls:'low',label:'成绩偏低',comments:['排名有点靠后……但初三是奇迹发生的地方。',cm()+'拍了拍你的肩膀："没事，我比你还低。"','你妈最近看你的眼神多了一丝复杂。']},
  {min:461,max:520,pct:8,icon:'💀',cls:'fei',label:'非酋开局',comments:['你认真的吗……这排名跟你的运气一样离谱。',cm()+'笑到趴桌上："你居然比我还低！"','没关系，触底反弹了解一下？逆袭故事都是这么开始的。']}
];

// ===== 行动 =====
var ACTIONS=[
  {id:'hard',name:'📖 埋头苦学',desc:'把自己钉在书桌前',eff:function(){return{skill:rI(5,9)};},
    fl:['做了三套卷子，第三套和第一套错的一模一样。','背了一晚古诗词，梦里都在"大漠孤烟直"……',cm()+'的笔记工整得像印刷品，你的像医生处方。','abandon abandon……'+cm()+'说这个词是在描述你的英语水平。','你盯着化学方程式看了半小时，它也盯着你看了半小时。','物理受力分析画了半小时，重力都忘标了。'+cm()+'："你这分析了个寂寞。"','刷完一本五三，感觉自己无所不能。翻开下一本——又不会了。','英语完形填空连错5个，你怀疑自己选的是平行宇宙的答案。']},
  {id:'tutor',name:'💰 报补习班',desc:'花钱买分数 · 💰100',cost:100,eff:function(){return{skill:rI(6,12)};},

function rollIntro(){
  initAudio();
  if(musicPlaying||!currentTrack)playMenuMusic();
  initG();
  _clUsed=[];  // 重置同学名字池
  G.family=FAMILIES[R()<.5?0:1];G.money=G.family.money;
  var roll=R()*100,acc=0,tier=null;
  for(var i=0;i<RANK_TIERS.length;i++){acc+=RANK_TIERS[i].pct;if(roll<acc){tier=RANK_TIERS[i];break;}}
  if(!tier)tier=RANK_TIERS[2];
  G.rank=rI(tier.min,tier.max);G.prevRank=G.rank;
  // 根据排名反查分数，再算出skill，确保开局第一次考试排名不跳
  var anchors=[[620,1],[610,3],[587,25],[579,50],[568,80],[520,160],[480,260],[430,400],[380,480],[300,515],[200,520]];
  var targetScore=480;
  for(var ai=0;ai<anchors.length-1;ai++){
    if(G.rank>=anchors[ai][1]&&G.rank<=anchors[ai+1][1]){
      var r2=(G.rank-anchors[ai][1])/(anchors[ai+1][1]-anchors[ai][1]);
      targetScore=Math.round(anchors[ai][0]+(anchors[ai+1][0]-anchors[ai][0])*r2);
      break;
    }
  }
  if(G.rank<anchors[0][1])targetScore=620;
  // skill = (targetScore - 50) / 580 * 100，加小随机
  G.skill=cl(Math.round((targetScore-50)/580*100)+rI(-2,2),30,99);
  show('S1');
  document.getElementById('intro-icon').textContent=tier.icon;
  document.getElementById('intro-icon').className='roll-anim';
  var badge=document.getElementById('intro-rank-badge');
  badge.className='rank-badge '+tier.cls;
  badge.innerHTML=tier.label+' · 全校第'+G.rank+'名/520人';
  document.getElementById('intro-family').textContent=G.family.name+' · '+G.family.desc+' · 💰'+G.money;
  document.getElementById('intro-comment').textContent=tier.comments[rI(0,tier.comments.length-1)];
}

function startRound(){
  G.phase='act';G.msel=[];G.flavors=[];

    var forget=G.rd>=6?rI(3,6):rI(2,4);
    G.skill=Math.max(5,G.skill-forget);
  }
  updUI();renderActions();

function renderActions(){
  var r=ROUNDS[G.rd];
  var need=r.extra?3:2;
  var gc=document.getElementById('gcont');
  var h='<div class="mt">'+r.name+'</div><div class="ms">'+r.m+' · 距中考'+r.days+'天</div>';
  h+='<div class="sel-hint">选择 '+need+' 个行动（已选 '+G.msel.length+'/'+need+'）</div>';
  if(G.flavors.length>0)h+='<div class="flavor">'+G.flavors.join(' | ')+'</div>';
  h+='<div class="agrid">';
  for(var i=0;i<ACTIONS.length;i++){
    var a=ACTIONS[i];
    var dis=(a.cost&&G.money<a.cost)||(a.minRd&&G.rd<a.minRd);
    var sel=G.msel.indexOf(a.id)>=0;
    var cls=dis?'acard dis':sel?'acard sel':'acard';
    h+='<div class="'+cls+'" data-id="'+a.id+'" onclick="'+(dis?'':'window._g.toggleAct(\''+a.id+'\')')+'"><div class="an">'+a.name+'</div><div class="ad">'+a.desc+'</div></div>';
  }
  h+='</div>';
  gc.innerHTML=h;
  showBar(true,'确认（'+G.msel.length+'/'+need+'）');
}

function toggleAct(id){
  var r=ROUNDS[G.rd];var need=r.extra?3:2;
  var idx=G.msel.indexOf(id);
  if(idx>=0){G.msel.splice(idx,1);}
  else if(G.msel.length<need){G.msel.push(id);}
  renderActions();
}

function showBar(v,txt){
  document.getElementById('cbar').style.display=v?'flex':'none';
  document.getElementById('cbtn').textContent=txt||'确认';
}

function onConfirm(){
  if(G.phase==='vol'){confirmVol();return;}
  if(G.phase!=='act')return;
  var r=ROUNDS[G.rd];var need=r.extra?3:2;
  if(G.msel.length!==need)return;
  G.flavors=[];
  for(var si=0;si<G.msel.length;si++){
    var id=G.msel[si];
    var act=null;
    for(var ai=0;ai<ACTIONS.length;ai++){if(ACTIONS[ai].id===id){act=ACTIONS[ai];break;}}
    if(!act)continue;
    if(act.eff){
      var e=act.eff();
      // 边际递减：学力越高越难提升（模拟真实学习瓶颈）
      if(e.skill>0){var sdim=Math.max(0.3,1-G.skill/150);e.skill=Math.max(1,Math.round(e.skill*sdim));}
      if(e.skill)G.skill=cl(G.skill+e.skill,0,100);
    }
    if(act.cost)G.money-=act.cost;
    if(id==='game')G.gameN++;
    if(id==='friend')G.friendN++;
    if(act.fl)G.flavors.push(pkNew(act.fl,G.usedFl,id));
  }
  G.phase='evt';
  updUI();
  afterActions();
}

function afterActions(){
  var r=ROUNDS[G.rd];
  if(G.rd===5){showFixedEvt('spring');return;}
  if(G.rd===6){showFixedEvt('oath');return;}
  if(r.vol){showVol();return;}
  if(r.final){showFinal();return;}
  triggerRandom();
}

function triggerRandom(){
  var all=[];
  var pools=[{arr:EVT_POS,w:.35},{arr:EVT_NEU,w:.30},{arr:EVT_NEG,w:.35}];
  for(var pi=0;pi<pools.length;pi++){
    for(var ei=0;ei<pools[pi].arr.length;ei++){
      var key=pi+'_'+ei;
      if(G.usedEvt.indexOf(key)<0)all.push({evt:pools[pi].arr[ei],key:key,w:pools[pi].w});
    }
  }
  if(!all.length){endRound();return;}
  var total=0;for(var i=0;i<all.length;i++)total+=all[i].w;
  var r=R()*total,acc=0,chosen=all[0];
  for(var i=0;i<all.length;i++){acc+=all[i].w;if(r<acc){chosen=all[i];break;}}
  G.usedEvt.push(chosen.key);
  showEvt(chosen.evt);
}

function chooseEvt(i){
  var o=G._evt.o[i],e=o.e||{};
  // 事件效果也有边际递减
  if(e.skill){
    var sv=e.skill;
    if(sv>0){sv=Math.max(1,Math.round(sv*Math.max(0.3,1-G.skill/150)));}
    G.skill=cl(G.skill+sv,0,100);
  }
  if(e.money)G.money+=e.money;
  updUI();
  var r=ROUNDS[G.rd];
  if(r.exam){setTimeout(function(){showExam(r.en);},600);}
  else{setTimeout(function(){endRound();},600);}
}

function calcScore(){
  // 总分 = 文化课(满分580) + 体育(默认满分50) = 满分630
  // 发挥系数 0.95~1.03，波动约±3%，一次考试最多偏差20~30分
  var fac=Math.max(.95,Math.min(1.03,1+(R()-.5)*.06));
  var academic=Math.min(580,Math.round(580*(G.skill/100)*fac));
  var total=Math.min(630,academic+50);
  return{total:total};
}
function showExam(name){

// 排名计算：分段线性映射，精确对齐真实分数线
// 四大587→第25名, 十大579→第50名, 二十大568→第80名
// 普高480→第260名(50%), 620+→全校前1~3名
// 平时考试有50%惯性，中考(final=true)纯分数排名
function estR(t,final){
  // 分段线性：(分数, 排名) 锚点
  var anchors=[[620,1],[610,3],[587,25],[579,50],[568,80],[520,160],[480,260],[430,400],[380,480],[300,515],[200,520]];
  var rank=260;
  if(t>=anchors[0][0]){rank=anchors[0][1];}
  else if(t<=anchors[anchors.length-1][0]){rank=anchors[anchors.length-1][1];}
  else{
    for(var i=0;i<anchors.length-1;i++){
      if(t<=anchors[i][0]&&t>=anchors[i+1][0]){
        var ratio=(t-anchors[i+1][0])/(anchors[i][0]-anchors[i+1][0]);
        rank=Math.round(anchors[i+1][1]+(anchors[i][1]-anchors[i+1][1])*ratio);
        break;
      }
    }
  }
  rank=Math.max(1,Math.min(520,rank));
  if(final)return rank;
  // 平时考试惯性：30%旧排名 + 70%新排名
  // 当新排名和旧排名差距大时（说明变化剧烈），进一步降低惯性
  var gap=Math.abs(rank-G.rank);
  var inertia=gap>100?0.1:gap>50?0.2:0.3;
  var blended=Math.round(rank*(1-inertia)+G.rank*inertia);
  return Math.max(1,Math.min(520,blended));
}
function normCDF(x){var a1=.254829592,a2=-.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=.3275911;var s=x<0?-1:1;x=Math.abs(x)/Math.sqrt(2);var t=1/(1+p*x);var y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);return .5*(1+s*y);}

function showVol(){
  G.phase='vol';G.vol=[];var sc=calcScore();var gc=document.getElementById('gcont');
  var h='<div class="mt">📮 "填志愿：人生第一次赌博"</div><div class="ms">你爸说填深中，你妈说求稳，'+cm()+'说"我们填一样的！"</div><div style="text-align:center;margin:6px 0;font-size:13px;color:#4ecdc4">预估 ~'+sc.total+' 分（选3个志愿）</div><div class="vgrid">';
  for(var i=0;i<VOL_SCHOOLS.length;i++){var s=VOL_SCHOOLS[i];var tag=sc.total>=s.l+20?'🟢 稳':sc.total>=s.l-20?'🟡 搏':'🔴 冲';h+='<div class="vc" data-i="'+i+'" onclick="window._g.togV('+i+')"><div class="vn">'+s.n+'</div><div class="vl">~'+s.l+'分 | '+tag+'</div></div>';}
  h+='</div>';gc.innerHTML=h;showBar(true,'确认志愿');
}
function togV(i){
  var idx=G.vol.indexOf(i);if(idx>=0)G.vol.splice(idx,1);else if(G.vol.length<3)G.vol.push(i);
  var cards=document.querySelectorAll('.vc');for(var j=0;j<cards.length;j++)cards[j].classList.remove('sel');
  for(var j=0;j<G.vol.length;j++){var el=document.querySelector('.vc[data-i="'+G.vol[j]+'"]');if(el)el.classList.add('sel');}
}
function confirmVol(){if(G.vol.length<1)return;document.getElementById('cbtn').onclick=function(){window._g.onConfirm();};endRound();}

function showFinal(){
  // 中考最终算分——只算一次，排名直接按分数算（不带惯性）
  var sc=calcScore();
  G.rank=estR(sc.total,true);
  G._finalScore=sc;

  // 先检查彩蛋结局
  for(var bi=0;bi<BONUS.length;bi++){
    if(BONUS[bi].cond(G)){showEnd(BONUS[bi]);return;}
  }

  // 根据分数直接确定结局，不再有随机录取
  var ending=null;
  for(var i=0;i<ENDINGS.length;i++){
    if(sc.total>=ENDINGS[i].min){ending=ENDINGS[i];break;}
  }
  if(!ending)ending=ENDINGS[ENDINGS.length-1];
  showEnd(ending);
}

function showEnd(ending){
  var sc=G._finalScore;
  if(musicPlaying)playEndMusic();
  show('S3');
  document.getElementById('e-emoji').textContent=ending.em;
  document.getElementById('e-title').textContent=ending.t;
  document.getElementById('e-quote').textContent=ending.q;
  document.getElementById('e-admit').textContent=ending.admit;
  document.getElementById('e-scores').innerHTML=
    '<div class="esr est"><span>📊 总分</span><span>'+sc.total+'/630</span></div>'+
    '<div class="esr" style="margin-top:6px"><span>🏅 全校</span><span>第'+G.rank+'名/520</span></div>';
}

function endRound(){G.rd++;if(G.rd>=10){showFinal();return;}updUI();startRound();}

function updUI(){
  var r=ROUNDS[G.rd]||ROUNDS[9];
  document.getElementById('g-month').textContent='R'+(G.rd+1)+' · '+r.m;
  document.getElementById('g-countdown').textContent='距中考 '+r.days+'天';
  document.getElementById('g-money').textContent='💰 '+G.money;
  var pct=Math.round((1-G.rank/520)*100);
  document.getElementById('rank-fill').style.width=pct+'%';
  document.getElementById('rank-text').textContent='🏅 第'+G.rank+'名 / 520人';
  var diff=G.prevRank-G.rank;var arrow='';
  if(diff>0)arrow='📈 上升'+diff+'名';else if(diff<0)arrow='📉 下降'+(-diff)+'名';
  document.getElementById('rank-arrow').textContent=arrow;
}

window._g={rollIntro:rollIntro,startGame:startGame,onConfirm:onConfirm,toggleAct:toggleAct,togV:togV,chooseEvt:chooseEvt,toggleMusic:toggleMusic};
initStars();
})();
</script>
